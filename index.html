<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bankinsurance</title>

  <style>
    :root{
      --text: #0b1f3a;
      --muted: rgba(11,31,58,.70);

      /* tiles "Canal+ style" but light */
      --tile-bg: rgba(255,255,255,.18);
      --tile-bg-hover: rgba(255,255,255,.26);
      --tile-border: rgba(0,25,60,.10);

      --radius: 18px;
      --gap: 14px;

      --shadow: 0 14px 35px rgba(0,0,0,.20);
      --shadow-tile: 0 10px 22px rgba(0,0,0,.14);
      --shadow-tile-hover: 0 16px 32px rgba(0,0,0,.18);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: url("banques.jpg") no-repeat center center fixed;
      background-size: cover;
      overflow-x: hidden;
    }

    /* léger voile pour que ça marche sur tout fond */
    body::before{
      content:"";
      position: fixed;
      inset:0;
      background:
        radial-gradient(900px 500px at 20% 10%, rgba(255,255,255,.14), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(0,0,0,.05));
      z-index:-1;
    }

    .wrap{
      max-width: 1180px;
      margin: 0 auto;
      padding: 38px 26px 44px;
    }

    header{
      margin-bottom: 18px;
    }

    h1{
      margin:0;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: .2px;
      color: #07182d;
    }

    .subtitle{
      margin-top: 6px;
      font-size: 14px;
      font-weight: 650;
      color: var(--muted);
    }

    .section{
      margin-top: 28px;
    }

    .section h2{
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 850;
      letter-spacing: .2px;
      color: #07182d;
      text-transform: none;
    }

    /* GRID super responsive */
    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: var(--gap);
    }

    /* tiles logos only */
    .tile{
      display:flex;
      align-items:center;
      justify-content:center;
      height: 92px;
      padding: 14px 16px;
      border-radius: var(--radius);

      background: var(--tile-bg);
      border: 1px solid var(--tile-border);
      box-shadow: var(--shadow-tile);

      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);

      text-decoration:none;
      color: inherit;

      transition: transform .22s cubic-bezier(.2,.8,.2,1),
                  background .22s ease,
                  box-shadow .22s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .tile:hover{
      transform: translateY(-4px);
      background: var(--tile-bg-hover);
      box-shadow: var(--shadow-tile-hover);
    }

    .tile:active{
      transform: translateY(-1px) scale(.99);
    }

    /* focus clavier propre */
    .tile:focus-visible{
      outline: 3px solid rgba(36,74,117,.35);
      outline-offset: 3px;
    }

    /* logos non-carrés */
    .tile img{
      max-width: 100%;
      max-height: 58px;
      object-fit: contain;
      display:block;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.16));
    }

    /* petite amélioration : logos très “fins” => un poil plus grand */
    .tile img.wide{
      max-height: 62px;
    }

    /* mobile */
    @media (max-width: 600px){
      .wrap{ padding: 28px 18px 36px; }
      .grid{ grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
      .tile{ height: 88px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>Bankinsurance</h1>
      <div class="subtitle">Banques • Assurances • Accès client</div>
    </header>

    <section class="section" aria-label="Banques">
      <h2>Banques</h2>
      <div class="grid">
        <a class="tile" href="https://mabanque.bnpparibas/fr/gerer/comptes-et-formules/gerer-ses-comptes"
           target="_blank" rel="noopener"
           title="BNP — Ma banque" aria-label="BNP — Ma banque">
          <img src="bnpparibas.png" alt="BNP Paribas">
        </a>

        <a class="tile" href="https://www.banquepopulaire.fr/professionnels/"
           target="_blank" rel="noopener"
           title="Banque Populaire — Espace pro" aria-label="Banque Populaire — Espace pro">
          <img src="banquepopulaire.png" alt="Banque Populaire">
        </a>

        <a class="tile" href="https://fortuneo.fr"
           target="_blank" rel="noopener"
           title="Fortuneo — Banque en ligne" aria-label="Fortuneo — Banque en ligne">
          <img src="fortuneo.png" alt="Fortuneo">
        </a>
      </div>
    </section>

    <section class="section" aria-label="Assurances">
      <h2>Assurances</h2>
      <div class="grid">
        <a class="tile" href="https://www.matmut.fr/app/login/login?returnurl=https%3A%2F%2Fwww.matmut.fr%2Fapp%2FEspaceSocietaireInternet%2F%23%2Faccueil"
           target="_blank" rel="noopener"
           title="Matmut — Espace client" aria-label="Matmut — Espace client">
          <img src="matmut.png" alt="Matmut">
        </a>

        <a class="tile" href="https://espace-client.allianz.fr/"
           target="_blank" rel="noopener"
           title="Allianz — Espace client" aria-label="Allianz — Espace client">
          <img src="allianz.png" alt="Allianz">
        </a>
      </div>
    </section>
  </div>
</body>
</html>
