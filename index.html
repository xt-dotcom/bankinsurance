<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bankinsurance</title>

  <style>
    :root{
      --txt: #0b1b2a;
      --muted: rgba(11,27,42,.62);

      /* Glass */
      --panel: rgba(210, 230, 242, 0.55);   /* proche Navimeteo */
      --tile:  rgba(214, 235, 247, 0.62);
      --tile2: rgba(214, 235, 247, 0.48);

      --radiusPanel: 26px;
      --radiusTile:  22px;
      --radiusIcon:  16px;

      --shadowPanel: 0 20px 55px rgba(0,0,0,.18);
      --shadowTile:  0 14px 28px rgba(0,0,0,.12);
      --shadowTileH: 0 18px 36px rgba(0,0,0,.16);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color: var(--txt);
      overflow:hidden;
    }

    /* Background like Navimeteo: image + voile doux */
    .bg{
      position: fixed; inset: 0;
      background:
        linear-gradient(180deg, rgba(30,70,100,.18) 0%, rgba(30,70,100,.08) 55%, rgba(30,70,100,.06) 100%),
        url("banques.jpg") center/cover no-repeat;
      transform: scale(1.02);
      filter: saturate(1.02);
    }
    .bg::after{
      content:"";
      position:absolute; inset:0;
      background:
        radial-gradient(1100px 700px at 70% 18%, rgba(255,255,255,.22), transparent 60%);
      pointer-events:none;
    }

    /* Layout */
    .app{
      position: relative;
      height: 100%;
      padding: clamp(18px, 4vw, 52px);
      display:flex;
      align-items:flex-start;
      justify-content:flex-start; /* Navimeteo : bloc plutôt à gauche */
    }

    /* Panel (no “window chrome”) */
    .panel{
      width: min(980px, 92vw);
      border-radius: var(--radiusPanel);
      background: linear-gradient(180deg, rgba(210,230,242,.62), rgba(210,230,242,.42));
      box-shadow: var(--shadowPanel);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: clamp(18px, 2.6vw, 26px);
      max-height: calc(100vh - 2 * clamp(18px, 4vw, 52px));
      overflow:auto;
      -webkit-overflow-scrolling: touch;
    }

    h1{
      margin: 4px 0 4px;
      font-size: clamp(28px, 3.6vw, 40px);
      letter-spacing: -0.6px;
    }
    .subtitle{
      margin: 0 0 18px;
      color: var(--muted);
      font-weight: 650;
      font-size: clamp(12px, 1.6vw, 15px);
    }

    /* Tiles grid: like Navimeteo (4 sur une ligne quand large, sinon s’adapte) */
    .grid{
      display:grid;
      grid-template-columns: repeat(4, minmax(210px, 1fr));
      gap: clamp(14px, 1.8vw, 18px);
    }

    /* Responsive breakpoints */
    @media (max-width: 1100px){
      .grid{ grid-template-columns: repeat(2, minmax(220px, 1fr)); }
    }
    @media (max-width: 560px){
      .app{ justify-content:center; }
      .grid{ grid-template-columns: 1fr; }
    }

    /* Tile: NO border frame, glass + shadow only */
    .tile{
      display:flex;
      align-items:center;
      gap: 14px;
      padding: 18px 18px;
      min-height: 106px;

      border-radius: var(--radiusTile);
      background: linear-gradient(180deg, var(--tile), var(--tile2));
      box-shadow: var(--shadowTile);

      text-decoration:none;
      color: inherit;

      transition: transform .14s ease, box-shadow .14s ease, background .14s ease;
      border: none;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .tile:hover{
      transform: translateY(-1px);
      box-shadow: var(--shadowTileH);
      background: linear-gradient(180deg, rgba(225,245,255,.68), rgba(214,235,247,.50));
    }
    .tile:active{ transform: scale(.99); }
    .tile:focus, .tile:focus-visible{ outline:none; }

    /* Icon capsule like Navimeteo */
    .icon{
      width: 62px;
      height: 62px;
      border-radius: var(--radiusIcon);
      background: rgba(255,255,255,.35);
      display:grid;
      place-items:center;
      box-shadow: 0 10px 18px rgba(0,0,0,.10);
      overflow:hidden;
      flex: 0 0 auto;
    }
    .icon img{
      width: 42px;
      height: 42px;
      object-fit: contain;
    }

    .ttext{ min-width:0; }
    .ttitle{
      margin:0;
      font-weight: 820;
      font-size: 17px;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tdesc{
      margin: 6px 0 0;
      color: var(--muted);
      font-weight: 650;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Optional: if you want the last row to align like Navimeteo (single tile left) */
    .span2{
      grid-column: span 2;
    }
    @media (max-width: 1100px){ .span2{ grid-column: auto; } }
  </style>
</head>

<body>
  <div class="bg" aria-hidden="true"></div>

  <main class="app">
    <section class="panel" role="application" aria-label="Bankinsurance launcher">
      <h1>Bankinsurance</h1>
      <p class="subtitle">Banques · Assurances · Accès client</p>

      <div class="grid">
        <a class="tile" href="https://mabanque.bnpparibas/fr/gerer/comptes-et-formules/gerer-ses-comptes" target="_blank" rel="noopener">
          <div class="icon"><img src="bnpparibas.png" alt="BNP Paribas"></div>
          <div class="ttext">
            <p class="ttitle">BNP</p>
            <p class="tdesc">Ma banque</p>
          </div>
        </a>

        <a class="tile" href="https://www.banquepopulaire.fr/professionnels/" target="_blank" rel="noopener">
          <div class="icon"><img src="banquepopulaire.png" alt="Banque Populaire"></div>
          <div class="ttext">
            <p class="ttitle">Banque Populaire</p>
            <p class="tdesc">Espace pro</p>
          </div>
        </a>

        <a class="tile" href="https://fortuneo.fr" target="_blank" rel="noopener">
          <div class="icon"><img src="fortuneo.png" alt="Fortuneo"></div>
          <div class="ttext">
            <p class="ttitle">Fortuneo</p>
            <p class="tdesc">Banque en ligne</p>
          </div>
        </a>

        <a class="tile" href="https://www.matmut.fr/app/login/login?returnurl=https%3A%2F%2Fwww.matmut.fr%2Fapp%2FEspaceSocietaireInternet%2F%23%2Faccueil" target="_blank" rel="noopener">
          <div class="icon"><img src="matmut.png" alt="Matmut"></div>
          <div class="ttext">
            <p class="ttitle">Matmut</p>
            <p class="tdesc">Espace client</p>
          </div>
        </a>

        <!-- Comme Navimeteo : une tuile seule en dernière ligne (option) -->
        <a class="tile span2" href="https://espace-client.allianz.fr/" target="_blank" rel="noopener">
          <div class="icon"><img src="allianz.png" alt="Allianz"></div>
          <div class="ttext">
            <p class="ttitle">Allianz</p>
            <p class="tdesc">Espace client</p>
          </div>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
