<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bankinsurance</title>
  <style>
    :root{
      --glass: rgba(255,255,255,0.65);
      --glass2: rgba(255,255,255,0.40);
      --text: #0b1b2a;
      --muted: rgba(11,27,42,0.62);
      --shadow: 0 10px 30px rgba(0,0,0,0.18);
      --radius: 22px;
      --tileRadius: 20px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color: var(--text);
      overflow:hidden;
    }

    /* Background image */
    .bg{
      position:fixed; inset:0;
      background:
        linear-gradient(180deg, rgba(12,34,58,0.30) 0%, rgba(12,34,58,0.15) 35%, rgba(12,34,58,0.10) 100%),
        url("banques.jpg") center/cover no-repeat;
      transform: scale(1.02);
      filter: saturate(1.05);
    }
    .bg::after{
      content:"";
      position:absolute; inset:0;
      background: radial-gradient(1200px 600px at 80% 25%, rgba(255,255,255,0.25), transparent 55%);
      pointer-events:none;
    }

    /* App window */
    .app{
      position:relative;
      height:100%;
      display:flex;
      align-items:flex-start;
      justify-content:flex-end;
      padding: 36px 48px;
    }

    .panel{
      width:min(520px, 92vw);
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--glass) 0%, rgba(255,255,255,0.55) 100%);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.35);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      overflow:hidden;
    }

    /* Top bar (optional "browser-like") */
    .topbar{
      display:flex;
      align-items:center;
      gap:10px;
      padding: 14px 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0.25));
      border-bottom: 1px solid rgba(255,255,255,0.28);
    }
    .dot{
      width:10px; height:10px; border-radius:50%;
      background: rgba(11,27,42,0.20);
    }
    .spacer{ flex:1; }
    .btnIcon{
      width:30px;height:30px;border-radius:10px;
      display:grid;place-items:center;
      background: rgba(255,255,255,0.45);
      border: 1px solid rgba(255,255,255,0.30);
    }
    .btnIcon svg{ opacity:0.75; }

    .content{
      padding: 18px 20px 22px;
    }

    h1{
      margin: 4px 0 2px;
      font-size: 34px;
      letter-spacing: -0.4px;
    }
    .subtitle{
      margin: 0 0 18px;
      color: var(--muted);
      font-weight: 600;
      font-size: 14px;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .tile{
      display:flex;
      align-items:center;
      gap:14px;
      padding: 14px 14px;
      border-radius: var(--tileRadius);
      background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0.35));
      border: 1px solid rgba(255,255,255,0.32);
      box-shadow: 0 10px 18px rgba(0,0,0,0.08);
      cursor:pointer;
      user-select:none;
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
      min-height: 90px;
      text-decoration:none;
      color: inherit;
    }
    .tile:hover{
      transform: translateY(-1px);
      box-shadow: 0 14px 24px rgba(0,0,0,0.12);
      background: linear-gradient(180deg, rgba(255,255,255,0.62), rgba(255,255,255,0.42));
    }
    .tile:active{
      transform: translateY(0px) scale(0.99);
      box-shadow: 0 10px 18px rgba(0,0,0,0.10);
    }

    .iconWrap{
      width:54px; height:54px;
      border-radius: 16px;
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(0,0,0,0.06);
      display:grid;
      place-items:center;
      flex: 0 0 auto;
      overflow:hidden;
    }
    .iconWrap img{
      width: 38px;
      height: 38px;
      object-fit: contain;
      image-rendering: -webkit-optimize-contrast;
    }

    .tileText{ line-height:1.1; }
    .tileTitle{
      font-weight: 800;
      font-size: 16px;
      margin: 0;
    }
    .tileDesc{
      margin: 6px 0 0;
      color: var(--muted);
      font-weight: 650;
      font-size: 13px;
    }

    /* Responsive: 1 column on small */
    @media (max-width: 520px){
      .app{ padding: 18px; justify-content:center; }
      .grid{ grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <main class="app">
    <section class="panel" role="application" aria-label="Bankinsurance launcher">
      <div class="topbar">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="spacer"></div>
        <div class="btnIcon" title="Actualiser" id="refreshBtn" role="button" aria-label="Actualiser">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M20 12a8 8 0 1 1-2.34-5.66" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M20 4v6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <div class="content">
        <h1>Bankinsurance</h1>
        <p class="subtitle">Banques · Assurances · Accès client</p>

        <div class="grid">
          <a class="tile" href="https://mabanque.bnpparibas/fr/gerer/comptes-et-formules/gerer-ses-comptes" target="_blank" rel="noopener">
            <div class="iconWrap"><img src="bnpparibas.png" alt="BNP Paribas"></div>
            <div class="tileText">
              <p class="tileTitle">BNP</p>
              <p class="tileDesc">Ma banque</p>
            </div>
          </a>

          <a class="tile" href="https://www.banquepopulaire.fr/professionnels/" target="_blank" rel="noopener">
            <div class="iconWrap"><img src="banquepopulaire.png" alt="Banque Populaire"></div>
            <div class="tileText">
              <p class="tileTitle">Banque Populaire</p>
              <p class="tileDesc">Espace pro</p>
            </div>
          </a>

          <a class="tile" href="https://fortuneo.fr" target="_blank" rel="noopener">
            <div class="iconWrap"><img src="fortuneo.png" alt="Fortuneo"></div>
            <div class="tileText">
              <p class="tileTitle">Fortuneo</p>
              <p class="tileDesc">Banque en ligne</p>
            </div>
          </a>

          <a class="tile" href="https://www.matmut.fr/app/login/login?returnurl=https%3A%2F%2Fwww.matmut.fr%2Fapp%2FEspaceSocietaireInternet%2F%23%2Faccueil" target="_blank" rel="noopener">
            <div class="iconWrap"><img src="matmut.png" alt="Matmut"></div>
            <div class="tileText">
              <p class="tileTitle">Matmut</p>
              <p class="tileDesc">Espace client</p>
            </div>
          </a>

          <a class="tile" href="https://espace-client.allianz.fr/" target="_blank" rel="noopener">
            <div class="iconWrap"><img src="allianz.png" alt="Allianz"></div>
            <div class="tileText">
              <p class="tileTitle">Allianz</p>
              <p class="tileDesc">Espace client</p>
            </div>
          </a>
        </div>
      </div>
    </section>
  </main>

  <script>
    // Petit confort: bouton refresh "visuel"
    document.getElementById("refreshBtn")?.addEventListener("click", () => location.reload());
  </script>
</body>
</html>
