<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bankinsurance</title>

  <style>
    :root{
      --text: #0b1f3a;
      --muted: rgba(11,31,58,.72);

      --tile-bg: rgba(255,255,255,.26);
      --tile-bg-hover: rgba(255,255,255,.34);
      --tile-border: rgba(0,25,60,.12);

      /* Ratio officiel */
      --tile-w: 160px;
      --tile-h: 110px;
      --radius: 0px;
      --gap: 18px;

      --shadow-tile: 0 10px 22px rgba(0,0,0,.14);
      --shadow-tile-hover: 0 16px 32px rgba(0,0,0,.18);

      /* Dashboard pills (light) */
      --pill-bg: rgba(255,255,255,.22);
      --pill-border: rgba(0,25,60,.10);
      --pill-text: rgba(11,31,58,.86);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: url("banques.jpg") no-repeat center center fixed;
      background-size: cover;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position: fixed;
      inset:0;
      background:
        radial-gradient(900px 500px at 20% 10%, rgba(255,255,255,.14), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(0,0,0,.05));
      z-index:-1;
    }

    .wrap{
      max-width: 1180px;
      margin: 0 auto;
      padding: 38px 26px 44px;
    }

    h1{
      margin:0;
      font-size: 28px;
      font-weight: 900;
      color:#07182d;
    }

    .subtitle{
      margin-top: 6px;
      font-size: 14px;
      font-weight: 650;
      color: var(--muted);
    }

    /* ✅ Dashboard light (discret) */
    .dash{
      margin-top: 12px;
      display:flex;
      flex-wrap:wrap;
      gap: 10px;
      align-items:center;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;

      background: var(--pill-bg);
      border: 1px solid var(--pill-border);
      box-shadow: 0 10px 20px rgba(0,0,0,.10);

      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);

      color: var(--pill-text);
      font-size: 12px;
      font-weight: 750;
      letter-spacing: .2px;
      white-space: nowrap;
    }

    .pill small{
      font-weight: 700;
      opacity: .75;
    }

    .section{ margin-top: 26px; }

    .section h2{
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 850;
      color:#07182d;
    }

    .grid{
      display:flex;
      flex-wrap:wrap;
      gap: var(--gap);
      align-items:flex-start;
    }

    .tile{
      width: var(--tile-w);
      height: var(--tile-h);
      border-radius: var(--radius);

      display:flex;
      align-items:center;
      justify-content:center;
      padding: 14px 14px;

      background: var(--tile-bg);
      border: 1px solid var(--tile-border);
      box-shadow: var(--shadow-tile);

      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);

      text-decoration:none;
      color: inherit;

      position: relative;
      transition: transform .18s cubic-bezier(.2,.8,.2,1),
                  background .18s ease,
                  box-shadow .18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .tile:hover{
      transform: translateY(-3px);
      background: var(--tile-bg-hover);
      box-shadow: var(--shadow-tile-hover);
    }
    .tile:active{ transform: translateY(-1px) scale(.99); }

    .tile img{
      max-width: 100%;
      max-height: 70px;
      object-fit: contain;
      display:block;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.16));
    }

    /* Tooltip custom */
    .tile[data-tip]::after{
      content: attr(data-tip);
      position:absolute;
      left: 50%;
      bottom: calc(100% + 10px);
      transform: translateX(-50%);
      white-space: nowrap;
      padding: 8px 10px;
      border-radius: 10px;

      background: rgba(10,20,35,.82);
      color: rgba(255,255,255,.96);
      font-size: 12px;
      font-weight: 650;
      letter-spacing: .2px;

      opacity: 0;
      pointer-events:none;
      transition: opacity .14s ease, transform .14s ease;
    }

    .tile[data-tip]::before{
      content:"";
      position:absolute;
      left: 50%;
      bottom: calc(100% + 4px);
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: rgba(10,20,35,.82);

      opacity: 0;
      pointer-events:none;
      transition: opacity .14s ease, transform .14s ease;
    }

    .tile:hover::after,
    .tile:hover::before,
    .tile:focus-visible::after,
    .tile:focus-visible::before{
      opacity: 1;
      transform: translateX(-50%) translateY(-2px);
    }

    .tile:focus-visible{
      outline: 3px solid rgba(36,74,117,.35);
      outline-offset: 3px;
    }

    /* Responsive */
    @media (max-width: 720px){
      :root{ --tile-w: 150px; --tile-h: 104px; --gap: 16px; }
      .wrap{ padding: 28px 18px 36px; }
      .tile img{ max-height: 66px; }
    }
    @media (max-width: 480px){
      :root{ --tile-w: 100%; --tile-h: 96px; }
      .tile{ width: 100%; }
      .tile img{ max-height: 64px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>Bankinsurance</h1>
      <div class="subtitle">Banques • Assurances • Accès client</div>

      <!-- ✅ Dashboard light -->
      <div class="dash" aria-label="Dashboard">
        <div class="pill" id="dashTime">🕒 <small>--:--</small></div>
        <div class="pill" id="dashDate">📅 <small>--</small></div>
        <div class="pill" id="dashWx">📍 <small>Météo : …</small></div>
      </div>
    </header>

    <section class="section" aria-label="Banques">
      <h2>Banques</h2>
      <div class="grid">
        <a class="tile" href="https://mabanque.bnpparibas/fr/gerer/comptes-et-formules/gerer-ses-comptes"
           target="_blank" rel="noopener"
           aria-label="BNP — Ma banque"
           data-tip="BNP — Ma banque">
          <img src="bnpparibas.png" alt="BNP Paribas">
        </a>

        <a class="tile" href="https://www.banquepopulaire.fr/professionnels/"
           target="_blank" rel="noopener"
           aria-label="Banque Populaire — Espace pro"
           data-tip="Banque Populaire — Espace pro">
          <img src="banquepopulaire.png" alt="Banque Populaire">
        </a>

        <a class="tile" href="https://fortuneo.fr"
           target="_blank" rel="noopener"
           aria-label="Fortuneo — Banque en ligne"
           data-tip="Fortuneo — Banque en ligne">
          <img src="fortuneo.png" alt="Fortuneo">
        </a>
      </div>
    </section>

    <section class="section" aria-label="Assurances">
      <h2>Assurances</h2>
      <div class="grid">
        <a class="tile" href="https://www.matmut.fr/app/login/login?returnurl=https%3A%2F%2Fwww.matmut.fr%2Fapp%2FEspaceSocietaireInternet%2F%23%2Faccueil"
           target="_blank" rel="noopener"
           aria-label="Matmut — Espace client"
           data-tip="Matmut — Espace client">
          <img src="matmut.png" alt="Matmut">
        </a>

        <a class="tile" href="https://espace-client.allianz.fr/"
           target="_blank" rel="noopener"
           aria-label="Allianz — Espace client"
           data-tip="Allianz — Espace client">
          <img src="allianz.png" alt="Allianz">
        </a>
      </div>
    </section>
  </div>

  <script>
    // Heure + date (FR)
    const fmtTime = new Intl.DateTimeFormat('fr-FR', { hour: '2-digit', minute: '2-digit' });
    const fmtDate = new Intl.DateTimeFormat('fr-FR', { weekday: 'long', day: '2-digit', month: 'long' });

    function tick(){
      const now = new Date();
      document.getElementById('dashTime').innerHTML = '🕒 <small>' + fmtTime.format(now) + '</small>';
      document.getElementById('dashDate').innerHTML = '📅 <small>' + fmtDate.format(now) + '</small>';
    }
    tick();
    setInterval(tick, 1000 * 15);

    // Météo locale (Open-Meteo, sans clé)
    const wxEl = document.getElementById('dashWx');

    function wxText(s){
      wxEl.innerHTML = '📍 <small>' + s + '</small>';
    }

    const wxCodeToTextFR = (code) => {
      const map = {
        0:"Ciel dégagé",
        1:"Plutôt dégagé", 2:"Partiellement nuageux", 3:"Couvert",
        45:"Brouillard", 48:"Brouillard givrant",
        51:"Bruine légère", 53:"Bruine", 55:"Bruine forte",
        56:"Bruine verglaçante légère", 57:"Bruine verglaçante",
        61:"Pluie faible", 63:"Pluie", 65:"Pluie forte",
        66:"Pluie verglaçante faible", 67:"Pluie verglaçante",
        71:"Neige faible", 73:"Neige", 75:"Neige forte",
        77:"Grains de neige",
        80:"Averses faibles", 81:"Averses", 82:"Averses fortes",
        85:"Averses de neige faibles", 86:"Averses de neige fortes",
        95:"Orage", 96:"Orage + grêle", 99:"Orage violent + grêle"
      };
      return map[code] || "Météo";
    };

    async function fetchWeather(lat, lon){
      // current_weather=true renvoie température, vent, code météo
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&windspeed_unit=kmh`;
      const r = await fetch(url, { cache: "no-store" });
      const j = await r.json();
      const cw = j.current_weather;
      if(!cw) throw new Error("no current_weather");

      const t = Math.round(cw.temperature);
      const w = Math.round(cw.windspeed);
      const desc = wxCodeToTextFR(cw.weathercode);

      wxText(`${desc} • ${t}°C • Vent ${w} km/h`);
    }

    function getLocationAndWeather(){
      wxText("Météo : localisation…");
      if(!navigator.geolocation){
        wxText("Météo : géoloc indisponible");
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const { latitude, longitude } = pos.coords;
          fetchWeather(latitude, longitude).catch(() => wxText("Météo : indisponible"));
        },
        () => wxText("Météo : autorisation refusée"),
        { enableHighAccuracy:false, timeout: 8000, maximumAge: 60 * 60 * 1000 }
      );
    }

    getLocationAndWeather();
    // rafraîchit toutes les 30 minutes
    setInterval(getLocationAndWeather, 1000 * 60 * 30);
  </script>
</body>
</html>
