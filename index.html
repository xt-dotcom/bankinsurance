<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bankinsurance</title>

  <style>
    :root{
      --text: #0b1f3a;
      --muted: rgba(11,31,58,.72);

      --tile-bg: rgba(255,255,255,.18);
      --tile-bg-hover: rgba(255,255,255,.26);
      --tile-border: rgba(0,25,60,.10);

      /* ✅ Rectangles fixes, plus compacts, coins carrés */
      --tile-w: 220px;
      --tile-h: 78px;
      --radius: 0px;

      --gap: 14px;

      --shadow-tile: 0 10px 22px rgba(0,0,0,.14);
      --shadow-tile-hover: 0 16px 32px rgba(0,0,0,.18);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: url("banques.jpg") no-repeat center center fixed;
      background-size: cover;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position: fixed;
      inset:0;
      background:
        radial-gradient(900px 500px at 20% 10%, rgba(255,255,255,.14), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(0,0,0,.05));
      z-index:-1;
    }

    .wrap{
      max-width: 1180px;
      margin: 0 auto;
      padding: 38px 26px 44px;
    }

    h1{
      margin:0;
      font-size: 28px;
      font-weight: 900;
      color:#07182d;
    }
    .subtitle{
      margin-top: 6px;
      font-size: 14px;
      font-weight: 650;
      color: var(--muted);
    }

    .section{ margin-top: 28px; }
    .section h2{
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 850;
      color:#07182d;
    }

    .grid{
      display:flex;
      flex-wrap:wrap;
      gap: var(--gap);
      align-items:flex-start;
    }

    .tile{
      width: var(--tile-w);
      height: var(--tile-h);
      border-radius: var(--radius);

      display:flex;
      align-items:center;
      justify-content:center;
      padding: 12px 16px;

      background: var(--tile-bg);
      border: 1px solid var(--tile-border);
      box-shadow: var(--shadow-tile);

      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);

      text-decoration:none;
      color: inherit;

      position: relative;
      transition: transform .18s cubic-bezier(.2,.8,.2,1),
                  background .18s ease,
                  box-shadow .18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .tile:hover{
      transform: translateY(-3px);
      background: var(--tile-bg-hover);
      box-shadow: var(--shadow-tile-hover);
    }
    .tile:active{ transform: translateY(-1px) scale(.99); }

    .tile img{
      max-width: 100%;
      max-height: 50px; /* ✅ ajusté à la nouvelle hauteur */
      object-fit: contain;
      display:block;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.16));
    }

    /* Tooltip custom */
    .tile[data-tip]::after{
      content: attr(data-tip);
      position:absolute;
      left: 50%;
      bottom: calc(100% + 10px);
      transform: translateX(-50%);
      white-space: nowrap;
      padding: 8px 10px;
      border-radius: 10px;

      background: rgba(10,20,35,.82);
      color: rgba(255,255,255,.96);
      font-size: 12px;
      font-weight: 650;
      letter-spacing: .2px;

      opacity: 0;
      pointer-events:none;
      transition: opacity .14s ease, transform .14s ease;
    }

    .tile[data-tip]::before{
      content:"";
      position:absolute;
      left: 50%;
      bottom: calc(100% + 4px);
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: rgba(10,20,35,.82);

      opacity: 0;
      pointer-events:none;
      transition: opacity .14s ease, transform .14s ease;
    }

    .tile:hover::after,
    .tile:hover::before,
    .tile:focus-visible::after,
    .tile:focus-visible::before{
      opacity: 1;
      transform: translateX(-50%) translateY(-2px);
    }

    .tile:focus-visible{
      outline: 3px solid rgba(36,74,117,.35);
      outline-offset: 3px;
    }

    /* Responsive: un peu plus petit, puis full width */
    @media (max-width: 720px){
      :root{ --tile-w: 200px; --tile-h: 74px; }
      .wrap{ padding: 28px 18px 36px; }
      .tile img{ max-height: 48px; }
    }
    @media (max-width: 480px){
      :root{ --tile-w: 100%; --tile-h: 74px; }
      .tile{ width: 100%; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>Bankinsurance</h1>
      <div class="subtitle">Banques • Assurances • Accès client</div>
    </header>

    <section class="section" aria-label="Banques">
      <h2>Banques</h2>
      <div class="grid">
        <a class="tile" href="https://mabanque.bnpparibas/fr/gerer/comptes-et-formules/gerer-ses-comptes"
           target="_blank" rel="noopener"
           aria-label="BNP — Ma banque"
           data-tip="BNP — Ma banque">
          <img src="bnpparibas.png" alt="BNP Paribas">
        </a>

        <a class="tile" href="https://www.banquepopulaire.fr/professionnels/"
           target="_blank" rel="noopener"
           aria-label="Banque Populaire — Espace pro"
           data-tip="Banque Populaire — Espace pro">
          <img src="banquepopulaire.png" alt="Banque Populaire">
        </a>

        <a class="tile" href="https://fortuneo.fr"
           target="_blank" rel="noopener"
           aria-label="Fortuneo — Banque en ligne"
           data-tip="Fortuneo — Banque en ligne">
          <img src="fortuneo.png" alt="Fortuneo">
        </a>
      </div>
    </section>

    <section class="section" aria-label="Assurances">
      <h2>Assurances</h2>
      <div class="grid">
        <a class="tile" href="https://www.matmut.fr/app/login/login?returnurl=https%3A%2F%2Fwww.matmut.fr%2Fapp%2FEspaceSocietaireInternet%2F%23%2Faccueil"
           target="_blank" rel="noopener"
           aria-label="Matmut — Espace client"
           data-tip="Matmut — Espace client">
          <img src="matmut.png" alt="Matmut">
        </a>

        <a class="tile" href="https://espace-client.allianz.fr/"
           target="_blank" rel="noopener"
           aria-label="Allianz — Espace client"
           data-tip="Allianz — Espace client">
          <img src="allianz.png" alt="Allianz">
        </a>
      </div>
    </section>
  </div>
</body>
</html>
