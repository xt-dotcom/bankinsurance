<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bankinsurance</title>
  <style>
    :root{
      --glassA: rgba(255,255,255,0.62);
      --glassB: rgba(255,255,255,0.38);
      --text: #0b1b2a;
      --muted: rgba(11,27,42,0.62);
      --shadowPanel: 0 18px 50px rgba(0,0,0,0.22);
      --shadowTile: 0 12px 22px rgba(0,0,0,0.10);
      --shadowTileHover: 0 18px 32px rgba(0,0,0,0.14);
      --radius: 22px;
      --tileRadius: 20px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color: var(--text);
      overflow:hidden;
    }

    /* Background */
    .bg{
      position:fixed; inset:0;
      background:
        linear-gradient(180deg, rgba(12,34,58,0.28) 0%, rgba(12,34,58,0.10) 55%, rgba(12,34,58,0.08) 100%),
        url("banques.jpg") center/cover no-repeat;
      transform: scale(1.02);
      filter: saturate(1.05);
    }
    .bg::after{
      content:"";
      position:absolute; inset:0;
      background: radial-gradient(1100px 650px at 78% 20%, rgba(255,255,255,0.22), transparent 60%);
      pointer-events:none;
    }

    /* Layout: responsive & scroll-safe */
    .app{
      position:relative;
      height:100%;
      display:flex;
      align-items:flex-start;
      justify-content:flex-end;
      padding: clamp(12px, 3vw, 40px);
    }

    .panel{
      width: min(560px, 94vw);
      max-height: calc(100vh - 2 * clamp(12px, 3vw, 40px));
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--glassA) 0%, rgba(255,255,255,0.52) 100%);
      box-shadow: var(--shadowPanel);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    /* Content can scroll if height is small */
    .content{
      padding: clamp(14px, 2.4vw, 22px);
      overflow:auto;
      -webkit-overflow-scrolling: touch;
    }

    h1{
      margin: 2px 0 2px;
      font-size: clamp(26px, 3.4vw, 34px);
      letter-spacing: -0.4px;
    }
    .subtitle{
      margin: 0 0 16px;
      color: var(--muted);
      font-weight: 650;
      font-size: clamp(12px, 1.6vw, 14px);
    }

    /* Grid becomes 2 columns when it fits, else 1 column */
    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }

    /* Tiles: NO border/frame, only glass + shadow */
    .tile{
      display:flex;
      align-items:center;
      gap:14px;
      padding: 14px 14px;
      border-radius: var(--tileRadius);
      background: linear-gradient(180deg, rgba(255,255,255,0.50), rgba(255,255,255,0.30));
      box-shadow: var(--shadowTile);
      cursor:pointer;
      user-select:none;
      transition: transform .14s ease, box-shadow .14s ease, background .14s ease;
      min-height: 92px;
      text-decoration:none;
      color: inherit;
      outline: none;
      border: none;              /* important */
    }
    .tile:hover{
      transform: translateY(-1px);
      box-shadow: var(--shadowTileHover);
      background: linear-gradient(180deg, rgba(255,255,255,0.58), rgba(255,255,255,0.36));
    }
    .tile:active{
      transform: translateY(0px) scale(0.99);
    }

    /* Icon: NO border/frame */
    .iconWrap{
      width:56px; height:56px;
      border-radius: 16px;
      background: rgba(255,255,255,0.42);
      display:grid;
      place-items:center;
      flex: 0 0 auto;
      overflow:hidden;
      border: none;              /* important */
      box-shadow: 0 8px 16px rgba(0,0,0,0.08);
    }
    .iconWrap img{
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .tileText{ line-height:1.1; min-width: 0; }
    .tileTitle{
      font-weight: 820;
      font-size: 16px;
      margin: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tileDesc{
      margin: 6px 0 0;
      color: var(--muted);
      font-weight: 650;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* On very small screens: center panel */
    @media (max-width: 720px){
      .app{ justify-content:center; }
    }

    /* On very low height: reduce spacing a bit */
    @media (max-height: 620px){
      .subtitle{ margin-bottom: 12px; }
      .tile{ min-height: 84px; }
      .grid{ gap: 12px; }
    }
  </style>
</head>

<body>
  <div class="bg" aria-hidden="true"></div>

  <main class="app">
    <section class="panel" role="application" aria-label="Bankinsurance launcher">
      <div class="content">
        <h1>Bankinsurance</h1>
        <p class="subtitle">Banques · Assurances · Accès client</p>

        <div class="grid">
          <a class="tile" href="https://mabanque.bnpparibas/fr/gerer/comptes-et-formules/gerer-ses-comptes" target="_blank" rel="noopener">
            <div class="iconWrap"><img src="bnpparibas.png" alt="BNP Paribas"></div>
            <div class="tileText">
              <p class="tileTitle">BNP</p>
              <p class="tileDesc">Ma banque</p>
            </div>
          </a>

          <a class="tile" href="https://www.banquepopulaire.fr/professionnels/" target="_blank" rel="noopener">
            <div class="iconWrap"><img src="banquepopulaire.png" alt="Banque Populaire"></div>
            <div class="tileText">
              <p class="tileTitle">Banque Populaire</p>
              <p class="tileDesc">Espace pro</p>
            </div>
          </a>

          <a class="tile" href="https://fortuneo.fr" target="_blank" rel="noopener">
            <div class="iconWrap"><img src="fortuneo.png" alt="Fortuneo"></div>
            <div class="tileText">
              <p class="tileTitle">Fortuneo</p>
              <p class="tileDesc">Banque en ligne</p>
            </div>
          </a>

          <a class="tile" href="https://www.matmut.fr/app/login/login?returnurl=https%3A%2F%2Fwww.matmut.fr%2Fapp%2FEspaceSocietaireInternet%2F%23%2Faccueil" target="_blank" rel="noopener">
            <div class="iconWrap"><img src="matmut.png" alt="Matmut"></div>
            <div class="tileText">
              <p class="tileTitle">Matmut</p>
              <p class="tileDesc">Espace client</p>
            </div>
          </a>

          <a class="tile" href="https://espace-client.allianz.fr/" target="_blank" rel="noopener">
            <div class="iconWrap"><img src="allianz.png" alt="Allianz"></div>
            <div class="tileText">
              <p class="tileTitle">Allianz</p>
              <p class="tileDesc">Espace client</p>
            </div>
          </a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
