<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bankinsurance</title>

  <style>
    :root{
      /* Design tokens */
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.72);

      --tile-bg: rgba(15,20,32,.42);
      --tile-bg-hover: rgba(15,20,32,.56);
      --tile-border: rgba(255,255,255,.10);

      /* Ratio officiel */
      --tile-w: 160px;
      --tile-h: 110px;
      --radius: 0px;
      --gap: 18px;

      --shadow-tile: 0 10px 22px rgba(0,0,0,.35);
      --shadow-tile-hover: 0 16px 32px rgba(0,0,0,.42);

      /* Header */
      --header-bg: rgba(10,14,24,.42);
      --header-border: rgba(255,255,255,.10);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: url("banques.jpg") no-repeat center center fixed;
      background-size: cover;
      overflow-x:hidden;
    }

    /* Dark overlay pour fonctionner avec n’importe quel fond */
    body::before{
      content:"";
      position: fixed;
      inset:0;
      background:
        radial-gradient(900px 500px at 20% 10%, rgba(255,255,255,.08), transparent 60%),
        linear-gradient(180deg, rgba(0,0,0,.28), rgba(0,0,0,.40));
      z-index:-1;
    }

    .wrap{
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 26px 44px; /* top réduit car header sticky */
    }

    /* ✅ Header sticky façon app pro */
    .header{
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 18px 0 14px;
      margin-bottom: 10px;

      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);

      /* On crée un “bandeau” glass sans bloquer le fond */
    }
    .header::before{
      content:"";
      position:absolute;
      left: -26px; right: -26px;
      top: 0; bottom: 0;
      background: var(--header-bg);
      border-bottom: 1px solid var(--header-border);
      box-shadow: 0 12px 30px rgba(0,0,0,.25);
      z-index:-1;
    }

    h1{
      margin:0;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: .2px;
    }

    .subtitle{
      margin-top: 6px;
      font-size: 14px;
      font-weight: 650;
      color: var(--muted);
    }

    /* ✅ Dashboard compact (heure/date + compteurs) */
    .dash{
      margin-top: 12px;
      display:flex;
      flex-wrap:wrap;
      gap: 10px;
      align-items:center;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;

      background: rgba(15,20,32,.38);
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 10px 20px rgba(0,0,0,.22);

      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);

      color: rgba(255,255,255,.90);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .2px;
      white-space: nowrap;
    }

    .section{ margin-top: 26px; }

    .section h2{
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 850;
      color: rgba(255,255,255,.92);
    }

    .grid{
      display:flex;
      flex-wrap:wrap;
      gap: var(--gap);
      align-items:flex-start;
    }

    .tile{
      width: var(--tile-w);
      height: var(--tile-h);
      border-radius: var(--radius);

      display:flex;
      align-items:center;
      justify-content:center;
      padding: 14px;

      background: var(--tile-bg);
      border: 1px solid var(--tile-border);
      box-shadow: var(--shadow-tile);

      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);

      text-decoration:none;
      color: inherit;

      position: relative;
      transition: transform .18s cubic-bezier(.2,.8,.2,1),
                  background .18s ease,
                  box-shadow .18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .tile:hover{
      transform: translateY(-3px);
      background: var(--tile-bg-hover);
      box-shadow: var(--shadow-tile-hover);
    }
    .tile:active{ transform: translateY(-1px) scale(.99); }

    .tile img{
      max-width: 100%;
      max-height: 70px;
      object-fit: contain;
      display:block;
      filter: drop-shadow(0 10px 16px rgba(0,0,0,.38));
    }

    /* Tooltip custom */
    .tile[data-tip]::after{
      content: attr(data-tip);
      position:absolute;
      left: 50%;
      bottom: calc(100% + 10px);
      transform: translateX(-50%);
      white-space: nowrap;
      padding: 8px 10px;
      border-radius: 10px;

      background: rgba(0,0,0,.78);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.96);
      font-size: 12px;
      font-weight: 650;
      letter-spacing: .2px;

      opacity: 0;
      pointer-events:none;
      transition: opacity .14s ease, transform .14s ease;
    }

    .tile[data-tip]::before{
      content:"";
      position:absolute;
      left: 50%;
      bottom: calc(100% + 4px);
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: rgba(0,0,0,.78);
      opacity: 0;
      pointer-events:none;
      transition: opacity .14s ease, transform .14s ease;
    }

    .tile:hover::after,
    .tile:hover::before,
    .tile:focus-visible::after,
    .tile:focus-visible::before{
      opacity: 1;
      transform: translateX(-50%) translateY(-2px);
    }

    .tile:focus-visible{
      outline: 3px solid rgba(120,170,255,.35);
      outline-offset: 3px;
    }

    /* Responsive (inchangé dans l’esprit) */
    @media (max-width: 720px){
      :root{ --tile-w: 150px; --tile-h: 104px; --gap: 16px; }
      .wrap{ padding: 14px 18px 36px; }
      .header::before{ left:-18px; right:-18px; }
      .tile img{ max-height: 66px; }
    }
    @media (max-width: 480px){
      :root{ --tile-w: 100%; --tile-h: 96px; }
      .tile{ width:100%; }
      .tile img{ max-height: 64px; }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <header class="header">
      <h1>Bankinsurance</h1>
      <div class="subtitle">Banques • Assurances • Accès client</div>

      <div class="dash" aria-label="Dashboard">
        <div class="pill" id="dashTime">🕒 --:--</div>
        <div class="pill" id="dashDate">📅 --</div>
        <div class="pill" id="dashTiles">🧩 Tuiles : --</div>
        <div class="pill" id="dashClicks">🖱️ Clics : --</div>
      </div>
    </header>

    <section class="section" aria-label="Banques">
      <h2>Banques</h2>
      <div class="grid">
        <a class="tile" data-tile
           href="https://mabanque.bnpparibas/fr/gerer/comptes-et-formules/gerer-ses-comptes"
           target="_blank" rel="noopener"
           aria-label="BNP — Ma banque"
           data-tip="BNP — Ma banque">
          <img src="bnpparibas.png" alt="BNP Paribas">
        </a>

        <a class="tile" data-tile
           href="https://www.banquepopulaire.fr/professionnels/"
           target="_blank" rel="noopener"
           aria-label="Banque Populaire — Espace pro"
           data-tip="Banque Populaire — Espace pro">
          <img src="banquepopulaire.png" alt="Banque Populaire">
        </a>

        <a class="tile" data-tile
           href="https://fortuneo.fr"
           target="_blank" rel="noopener"
           aria-label="Fortuneo — Banque en ligne"
           data-tip="Fortuneo — Banque en ligne">
          <img src="fortuneo.png" alt="Fortuneo">
        </a>
      </div>
    </section>

    <section class="section" aria-label="Assurances">
      <h2>Assurances</h2>
      <div class="grid">
        <a class="tile" data-tile
           href="https://www.matmut.fr/app/login/login?returnurl=https%3A%2F%2Fwww.matmut.fr%2Fapp%2FEspaceSocietaireInternet%2F%23%2Faccueil"
           target="_blank" rel="noopener"
           aria-label="Matmut — Espace client"
           data-tip="Matmut — Espace client">
          <img src="matmut.png" alt="Matmut">
        </a>

        <a class="tile" data-tile
           href="https://espace-client.allianz.fr/"
           target="_blank" rel="noopener"
           aria-label="Allianz — Espace client"
           data-tip="Allianz — Espace client">
          <img src="allianz.png" alt="Allianz">
        </a>
      </div>
    </section>

  </div>

  <script>
    // Dashboard: heure + date
    const $ = (id) => document.getElementById(id);
    const fmtTime = new Intl.DateTimeFormat('fr-FR', { hour: '2-digit', minute: '2-digit' });
    const fmtDate = new Intl.DateTimeFormat('fr-FR', { weekday: 'long', day: '2-digit', month: 'long' });

    function tick(){
      const now = new Date();
      $('dashTime').textContent = '🕒 ' + fmtTime.format(now);
      $('dashDate').textContent = '📅 ' + fmtDate.format(now);
    }
    tick();
    setInterval(tick, 1000 * 15);

    // Compteur de tuiles
    const tiles = Array.from(document.querySelectorAll('[data-tile]'));
    $('dashTiles').textContent = '🧩 Tuiles : ' + tiles.length;

    // Compteur de clics persistant (localStorage)
    const KEY = 'launcher_clicks_bankinsurance';
    const getClicks = () => Number(localStorage.getItem(KEY) || '0');
    const setClicks = (n) => localStorage.setItem(KEY, String(n));

    function refreshClicks(){
      $('dashClicks').textContent = '🖱️ Clics : ' + getClicks();
    }
    refreshClicks();

    tiles.forEach(t => {
      t.addEventListener('click', () => {
        setClicks(getClicks() + 1);
        refreshClicks();
      }, { passive: true });
    });
  </script>
</body>
</html>
